backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "films"
    label: "Films"
    folder: "content/films"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Film Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "string" }
      - { label: "Trailer Link", name: "trailer", widget: "string" }
      - { label: "Poster", name: "poster", widget: "image" }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "biography"
    label: "Biography"
    files:
      - file: "content/bio.md"
        label: "Biography"
        name: "bio"
        fields:
          - { label: "Content", name: "body", widget: "markdown" }